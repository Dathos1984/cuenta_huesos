<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Huesos</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23FFC107'/%3E%3Cpath d='M30 70 Q 50 80, 70 70' stroke='%23000000' stroke-width='5' fill='none'/%3E%3Ccircle cx='30' cy='35' r='10' fill='%23000000'/%3E%3Ccircle cx='70' cy='35' r='10' fill='%23000000'/%3E%3C/svg%3E">
    <style>
        body {
            background-color: #6495ED;
            font-family: Arial, sans-serif;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
            font-size: 1.8rem;
        }

        h2 {
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 10px;
            text-align: center;
        }

        h3 {
            color: #FFFFFF;
            background-color: #333333;
            padding: 10px;
            border-radius: 5px;
            font-size: 1rem;
            text-align: center;
        }

        .tab {
            display: flex;
            flex-wrap: wrap;
            background-color: #F8F8F8;
            border: 1px solid #ccc;
            border-radius: 4px;
            gap: 2px;
        }

        .tab button {
            background-color: inherit;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 12px 15px;
            transition: 0.3s;
            flex: 1 1 auto;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: #333;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #E0E0E0;
            color: #000;
        }

        #chistes-container {
            padding: 20px 15px;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 4px 4px;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .chiste-box {
            margin-bottom: 15px;
            padding: 15px;
            color: #000000;
            background-color: #F5F5F5;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chiste-box p {
            margin: 5px 0;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.1rem; }
            h3 { font-size: 0.9rem; }
            .tab button {
                padding: 10px;
                font-size: 0.85rem;
            }
        }
    </style>
    <script src="https://twemoji.maxcdn.com/v/latest/twemoji.min.js" crossorigin="anonymous"></script>
    <script>
        // Almacenará los chistes una vez que se carguen del archivo externo
        let chistesData = {};

        // Función que lee el archivo JSON externo al cargar la página
        async function cargarChistes() {
            try {
                const respuesta = await fetch('chistes.json');
                chistesData = await respuesta.json();
                
                // Forzar el click en la primera pestaña para mostrar los chistes iniciales
                const primerBoton = document.querySelector(".tablinks");
                if (primerBoton) primerBoton.click();
            } catch (error) {
                console.error("Error cargando los chistes:", error);
                document.getElementById("chistes-container").innerHTML = "<p>Error al cargar los chistes de la base de datos.</p>";
            }
        }

        // Función para renderizar los chistes según la pestaña seleccionada
        function openTab(evt, tabName) {
            const tablinks = document.getElementsByClassName("tablinks");
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            evt.currentTarget.className += " active";

            const container = document.getElementById("chistes-container");
            container.innerHTML = ""; 

            const chistesDeCategoria = chistesData[tabName] || [];

            chistesDeCategoria.forEach(chiste => {
                const box = document.createElement("div");
                box.className = "chiste-box";

                chiste.lineas.forEach(lineaText => {
                    const p = document.createElement("p");
                    p.textContent = lineaText;
                    box.appendChild(p);
                });

                container.appendChild(box);
            });
        }

        // Inicializar la carga de datos al abrir la web
        window.onload = cargarChistes;
    </script>
</head>

<body>
    <div class="container">
        <h1>&#128514; &#129315; Cuenta Huesos // Bad Jokes &#129315;&#128514;</h1>
        <h2>&#128515; Huesitos para reirse // Jokes to make laugh &#128515;</h2>
        <h3>&#128119; Contados en los pasos a prod // Jokes performed in the deployments to prod &#128119;</h3>
        
        <div class="tab">
            <button class="tablinks" onclick="openTab(event,'Aleatorios')">&#129313; Aleatorios</button>
            <button class="tablinks" onclick="openTab(event,'Ingles')">&#129299; Ingles</button>
            <button class="tablinks" onclick="openTab(event,'Crueles')">&#128519; Crueles</button>
            <button class="tablinks" onclick="openTab(event,'Vampiros')">&#128121; Vampiros</button>
            <button class="tablinks" onclick="openTab(event,'NoEsLoMismo')">&#128565; No es lo mismo</button>
            <button class="tablinks" onclick="openTab(event,'English')">&#128578; English</button>
        </div>

        <div id="chistes-container">Cargando chistes...</div>
    </div>
</body>
</html>
